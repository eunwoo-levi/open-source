<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}개발 일지{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
        <i class="bi bi-journal-code me-2"></i>개발 일지
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
               href="{{ url_for('index') }}">
              <i class="bi bi-house me-1"></i>대시보드
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint in ['entries','view_entry','new_entry','edit_entry'] %}active{% endif %}"
               href="{{ url_for('entries') }}">
              <i class="bi bi-file-text me-1"></i>일지
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'tags' %}active{% endif %}"
               href="{{ url_for('tags') }}">
              <i class="bi bi-tags me-1"></i>태그
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'search' %}active{% endif %}"
               href="{{ url_for('search') }}">
              <i class="bi bi-search me-1"></i>검색
            </a>
          </li>
        </ul>
        <form class="d-flex" action="{{ url_for('search') }}" method="get">
          <input class="form-control form-control-sm me-2" type="search" name="q"
                 placeholder="일지 검색..." value="{{ request.args.get('q', '') }}" />
          <button class="btn btn-outline-light btn-sm" type="submit">
            <i class="bi bi-search"></i>
          </button>
        </form>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-muted py-3 border-top">
    <small>개발 일지 &copy; 2026</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
