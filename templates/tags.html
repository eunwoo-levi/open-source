{% extends 'base.html' %}
{% block title %}태그 관리 - 개발 일지{% endblock %}

{% block content %}
<h2 class="fw-bold mb-4"><i class="bi bi-tags me-2"></i>태그 관리</h2>

<div class="row g-4">
  <!-- Add Tag -->
  <div class="col-md-4">
    <div class="card shadow-sm">
      <div class="card-header fw-semibold bg-light">새 태그 추가</div>
      <div class="card-body">
        <form method="post" action="{{ url_for('new_tag') }}">
          <div class="input-group">
            <input type="text" name="name" class="form-control"
                   placeholder="태그 이름" required />
            <button class="btn btn-primary" type="submit">
              <i class="bi bi-plus-lg"></i>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Tag List -->
  <div class="col-md-8">
    <div class="card shadow-sm">
      <div class="card-header fw-semibold bg-light">
        태그 목록 <span class="badge bg-secondary ms-1">{{ tags|length }}</span>
      </div>
      <div class="card-body p-0">
        {% if tags %}
          <ul class="list-group list-group-flush">
            {% for tag in tags %}
              <li class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                  <i class="bi bi-tag me-2 text-muted"></i>
                  <a href="{{ url_for('entries', tag=tag.id) }}"
                     class="text-decoration-none fw-semibold">{{ tag.name }}</a>
                  <span class="text-muted small ms-2">{{ tag.entries|length }}개의 일지</span>
                </div>
                <form action="{{ url_for('delete_tag', tag_id=tag.id) }}"
                      method="post"
                      onsubmit="return confirm('태그 \'{{ tag.name }}\'을 삭제하시겠습니까?')">
                  <button class="btn btn-outline-danger btn-sm">
                    <i class="bi bi-trash"></i>
                  </button>
                </form>
              </li>
            {% endfor %}
          </ul>
        {% else %}
          <div class="text-center py-4 text-muted">
            <i class="bi bi-tags display-5"></i>
            <p class="mt-2">등록된 태그가 없습니다.</p>
          </div>
        {% endif %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
